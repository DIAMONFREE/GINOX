<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIXON | منصة الجيمرز الاحترافية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Changa:wght@500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #020202;
            --bg-card: #0a0a0a;
            --accent: #00f2ff;
            --danger: #e50914;
            --text-main: #ffffff;
            --text-dim: #888;
        }

        /* الأساسيات */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
            user-select: none; -webkit-user-select: none;
        }

        #snow-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        /* الهيدر */
        header {
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px);
            padding: 12px 5%; display: flex; justify-content: space-between; align-items: center;
            position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-family: 'Changa', sans-serif; font-size: 26px; font-weight: 800; color: var(--accent); cursor: pointer; }
        .nav-links { display: flex; gap: 20px; list-style: none; align-items: center; }
        .nav-links li a { color: var(--text-dim); text-decoration: none; cursor: pointer; font-family: 'Changa'; font-size: 14px; }
        .nav-links li a.active { color: var(--accent); }
        .beta-tag { 
            font-size: 9px; background: rgba(0,242,255,0.1); color: var(--accent); 
            padding: 1px 5px; border-radius: 4px; margin-right: 5px; 
            border: 1px solid rgba(0,242,255,0.2); vertical-align: middle;
        }

        /* الصفحات */
        .page-section { display: none; padding: 100px 5% 50px; min-height: 100vh; position: relative; z-index: 2; }
        .page-section.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--bg-card); border-radius: 15px; overflow: hidden; border: 1px solid #111; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,242,255,0.1); }
        .card-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .card-body { padding: 15px; }
        .card-title { font-size: 16px; font-family: 'Changa'; line-height: 1.4; }

        /* --- عارض المقالات المطور (الحيوي) --- */
        .article-viewer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top, #111 0%, #000 100%);
            z-index: 2000; display: none; overflow-y: auto;
        }
        .article-viewer.active { display: block; }
        
        .article-container { 
            max-width: 800px; margin: 20px auto; padding: 15px; 
            animation: slideUp 0.5s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        #a-title { 
            font-family: 'Changa'; font-size: 26px; font-weight: 800; 
            margin-bottom: 12px; color: var(--accent); line-height: 1.2;
            text-shadow: 0 2px 10px rgba(0,242,255,0.1);
        }

        .article-body { 
            color: #d0d0d0; line-height: 1.75; font-size: 17px; 
            border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px;
        }

        /* الصور: لا حدود، في مكانها، مع لمسة حيوية */
        .article-body img { 
            width: 100% !important; height: auto !important; display: block;
            margin: 15px 0; border: none !important; outline: none !important;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); border-radius: 10px;
        }

        /* زر العودة الذكي */
        .close-btn { 
            position: sticky; top: 15px; right: 15px; 
            background: rgba(0,242,255,0.1); color: var(--accent);
            border: 1px solid rgba(0,242,255,0.3); padding: 8px 18px; 
            border-radius: 30px; backdrop-filter: blur(10px);
            font-weight: bold; cursor: pointer; z-index: 2100; font-family: 'Changa';
            transition: 0.3s; font-size: 13px;
        }
        .close-btn:hover { background: var(--accent); color: #000; }

        /* المشغل الاحترافي */
        .video-container { position: relative; width: 100%; margin: 25px 0; background: #000; border-radius: 8px; overflow: hidden; direction: ltr; }
        .video-container video { width: 100%; aspect-ratio: 16/9; display: block; }
        .v-controls {
            position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 10px; display: flex; flex-direction: column; opacity: 0; transition: 0.3s;
        }
        .video-container:hover .v-controls { opacity: 1; }
        .v-progress { width: 100%; margin-bottom: 8px; }
        .v-progress input { width: 100%; accent-color: var(--danger); cursor: pointer; height: 3px; }
        .v-buttons { display: flex; justify-content: space-between; align-items: center; color: #fff; }
        .v-left, .v-right { display: flex; align-items: center; gap: 15px; }
        .v-controls button { background: none; border: none; color: #fff; cursor: pointer; font-size: 16px; }
        .v-time { font-size: 11px; font-family: monospace; }
        .v-speed { background: transparent; color: #fff; border: none; font-size: 12px; cursor: pointer; }

        .hero-btn { background: var(--accent); color: #000; padding: 15px 40px; border-radius: 30px; font-family: 'Changa'; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        .hero-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0,242,255,0.3); }
    </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>

    <header>
        <div class="logo" onclick="showPage('home')">GIXON</div>
        <nav>
            <ul class="nav-links">
                <li><a onclick="showPage('home')" id="nav-home" class="active">الرئيسية</a></li>
                <li><a onclick="showPage('news')" id="nav-news">الأخبار</a></li>
                <li><a style="opacity:0.5; cursor:not-allowed;">المتجر <span class="beta-tag">Beta</span></a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="page-section active">
        <div style="height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
            <h1 style="font-family: 'Changa'; font-size: clamp(50px, 15vw, 100px); color: var(--accent); margin-bottom: 10px;">GIXON</h1>
            <p style="color: var(--text-dim); margin-bottom: 30px; font-size: 18px;">الصحافة المستقلة لعشاق الألعاب</p>
            <button class="hero-btn" onclick="showPage('news')">استكشف الأخبار</button>
        </div>
    </section>

    <section id="news" class="page-section">
        <div id="news-grid" class="grid"></div>
    </section>

    <div id="article-viewer" class="article-viewer">
        <div style="display: flex; justify-content: flex-start; padding: 15px;">
            <button class="close-btn" onclick="closeArticle()">← عودة</button>
        </div>
        <div class="article-container">            
            <h1 id="a-title"></h1>
            <div id="a-body" class="article-body"></div>
        </div>
    </div>

    <script>
        // --- محرك الثلوج ---
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let flakes = [];
        function initSnow() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            flakes = Array.from({length: 70}, () => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.5, d: Math.random()*0.4 + 0.3 }));
        }
        function drawSnow() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "rgba(255,255,255,0.2)"; ctx.beginPath();
            flakes.forEach(f => { ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2); f.y += f.d; if(f.y > canvas.height) f.y = -5; });
            ctx.fill(); requestAnimationFrame(drawSnow);
        }

        // --- محرك بلوجر ---
        const API_KEY = 'AIzaSyBEgRGqe5EorWOKMFZIqa55UShVpcUbLmM';
        const BLOG_URL = 'https://gixondz.blogspot.com/';

        async function fetchNews() {
            const grid = document.getElementById('news-grid');
            try {
                const bRes = await fetch(`https://www.googleapis.com/blogger/v3/blogs/byurl?url=${BLOG_URL}&key=${API_KEY}`);
                const bData = await bRes.json();
                const pRes = await fetch(`https://www.googleapis.com/blogger/v3/blogs/${bData.id}/posts?key=${API_KEY}&maxResults=20`);
                const posts = await pRes.json();
                grid.innerHTML = posts.items.map(post => `
                    <div class="card" onclick='openArticle(${JSON.stringify(post).replace(/'/g, "&apos;")})'>
                        <img src="${getPostImg(post.content)}" class="card-img">
                        <div class="card-body"><h3 class="card-title">${post.title}</h3></div>
                    </div>
                `).join('');
            } catch (e) { grid.innerHTML = 'خطأ في الاتصال.'; }
        }

        function getPostImg(c) {
            const m = c.match(/<img[^>]+src="([^">]+)"/);
            return m ? m[1] : 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=500';
        }

        // --- نظام عرض المحتوى والمشغل ---
        function openArticle(post) {
            document.getElementById('a-title').innerText = post.title;
            let content = post.content;

            const mp4Match = content.match(/https?:\/\/[^\s"'<>]+\.mp4/i);
            if (mp4Match) {
                const videoUrl = mp4Match[0];
                const playerHTML = `
                <div class="video-container" id="vCont">
                    <video id="vPlayer" src="${videoUrl}"></video>
                    <div class="v-controls">
                        <div class="v-progress"><input type="range" id="vSeek" value="0"></div>
                        <div class="v-buttons">
                            <div class="v-left">
                                <button id="vBtn"><i class="fas fa-play"></i></button>
                                <div class="v-time"><span id="vCur">00:00</span> / <span id="vDur">00:00</span></div>
                            </div>
                            <div class="v-right">
                                <select id="vSpd" class="v-speed"><option value="1">1x</option><option value="1.5">1.5x</option><option value="2">2x</option></select>
                                <button id="vFs"><i class="fas fa-expand"></i></button>
                            </div>
                        </div>
                    </div>
                </div>`;
                content = content.replace(videoUrl, playerHTML).replace(/<a[^>]*href=["']?.*\.mp4["']?[^>]*>.*?<\/a>/gi, playerHTML);
            }

            document.getElementById('a-body').innerHTML = content;
            document.getElementById('article-viewer').classList.add('active');
            document.body.style.overflow = 'hidden';
            if(mp4Match) setupVideo();
        }

        function setupVideo() {
            const v = document.getElementById('vPlayer'), b = document.getElementById('vBtn'), s = document.getElementById('vSeek'), 
                  cur = document.getElementById('vCur'), dur = document.getElementById('vDur'), f = document.getElementById('vFs'), sp = document.getElementById('vSpd');
            const fmt = (t) => { let m=Math.floor(t/60), s=Math.floor(t%60); return `${m<10?'0':''}${m}:${s<10?'0':''}${s}`; };
            b.onclick = () => { if(v.paused){ v.play(); b.innerHTML='<i class="fas fa-pause"></i>'; } else { v.pause(); b.innerHTML='<i class="fas fa-play"></i>'; } };
            v.ontimeupdate = () => { s.value = (v.currentTime/v.duration)*100 || 0; cur.innerText = fmt(v.currentTime); };
            v.onloadedmetadata = () => dur.innerText = fmt(v.duration);
            s.oninput = () => v.currentTime = (s.value/100)*v.duration;
            f.onclick = () => document.fullscreenElement ? document.exitFullscreen() : v.parentElement.requestFullscreen();
            sp.onchange = () => v.playbackRate = sp.value;
        }

        function closeArticle() {
            document.getElementById('article-viewer').classList.remove('active');
            document.getElementById('a-body').innerHTML = '';
            document.body.style.overflow = 'auto';
        }

        function showPage(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(document.getElementById('nav-'+id)) document.getElementById('nav-'+id).classList.add('active');
            window.scrollTo(0,0);
        }

        // --- نظام الحماية للزوار ---
        (function() {
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.onkeydown = e => { if (e.keyCode == 123 || (e.ctrlKey && (e.keyCode == 85 || e.keyCode == 83))) return false; };
            setInterval(() => { let start=Date.now(); debugger; if(Date.now()-start>100) document.body.innerHTML='<div style="color:#00f2ff; text-align:center; padding-top:20%; font-family:Changa;"><h1>GIXON SECURITY ACTIVE</h1></div>'; }, 500);
        })();

        window.onload = () => { initSnow(); drawSnow(); fetchNews(); };
    </script>
</body>
</html>
