<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIXON | أخبار الجيمرز الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Changa:wght@500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #020202;
            --bg-card: #0a0a0a;
            --accent: #00f2ff;
            --text-main: #ffffff;
            --text-dim: #888;
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            outline: none !important;
        }

        body { 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            font-family: 'Cairo', sans-serif;
            user-select: none; -webkit-user-select: none;
            overflow-x: hidden;
        }

        #snow-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        header {
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(25px);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
            position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-family: 'Changa', sans-serif; font-size: 30px; font-weight: 800; color: var(--accent); cursor: pointer; }
        
        .nav-links { display: flex; gap: 25px; list-style: none; }
        .nav-links li a { color: var(--text-dim); text-decoration: none; cursor: pointer; font-family: 'Changa'; }
        .nav-links li a.active { color: var(--accent); }
        .beta-tag { font-size: 9px; background: #333; color: #fff; padding: 2px 6px; border-radius: 4px; margin-right: 5px; opacity: 0.6; }

        .page-section { display: none; padding: 140px 5% 50px; min-height: 100vh; position: relative; z-index: 2; }
        .page-section.active { display: block; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }

        .card { 
            background: var(--bg-card); border-radius: 20px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.03); cursor: pointer; transition: var(--transition);
        }
        .card:hover { transform: scale(1.03); border-color: var(--accent); box-shadow: 0 15px 35px rgba(0,242,255,0.1); }
        .card-img { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; pointer-events: none; }
        .card-body { padding: 20px; }
        .card-title { font-size: 18px; font-family: 'Changa'; line-height: 1.5; color: #fff; }

        .article-viewer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            z-index: 2000; display: none; overflow-y: auto; padding: 40px 5%;
        }
        .article-viewer.active { display: block; animation: openArt 0.4s ease; }
        @keyframes openArt { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .article-container { 
            max-width: 900px; margin: 40px auto; background: rgba(255,255,255,0.02); 
            padding: 45px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.05);
        }

        .article-body img { 
            width: 100%; height: auto !important; object-fit: contain; 
            border-radius: 20px; margin: 30px 0; pointer-events: none;
            border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .close-btn { 
            position: fixed; top: 25px; left: 25px; background: var(--accent); color: #000;
            border: none; padding: 12px 25px; border-radius: 12px; 
            font-weight: 800; cursor: pointer; font-family: 'Changa';
        }

        .hero-btn {
            background: var(--accent); color: #000; padding: 18px 60px; 
            border-radius: 50px; font-family: 'Changa'; font-weight: bold; 
            font-size: 20px; cursor: pointer; border: none; transition: 0.3s;
        }
        .hero-btn:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(0,242,255,0.4); }

        /* =========================================================
           تنسيقات المشغل الاحترافي (المطلوبة من قبلك بالضبط)
        ========================================================= */
        .video-container {
            position: relative;
            width: 100%; /* تم التعديل ليأخذ عرض المقال بالكامل */
            margin: 30px 0;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .video-container video {
            width: 100%;
            display: block;
            cursor: pointer;
            aspect-ratio: 16/9; /* لضمان أبعاد متناسقة */
            background: #000;
        }

        .controls {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-sizing: border-box;
            opacity: 0;
            transition: opacity 0.3s ease;
            direction: ltr; /* أزرار من اليسار لليمين */
        }

        .video-container:hover .controls { opacity: 1; }

        .progress-bar { width: 100%; margin-bottom: 12px; }

        .progress-bar input[type="range"] {
            width: 100%; cursor: pointer; accent-color: #e50914; height: 4px;
        }

        .buttons { display: flex; align-items: center; justify-content: space-between; color: #fff; }
        .left-controls, .right-controls { display: flex; align-items: center; gap: 18px; }

        .controls button {
            background: none; border: none; color: #fff; font-size: 18px;
            cursor: pointer; transition: color 0.2s, transform 0.1s; padding: 0;
        }

        .controls button:hover { color: #e50914; transform: scale(1.1); }

        .time { font-size: 13px; user-select: none; font-family: monospace; letter-spacing: 1px; color: #fff;}

        .controls select {
            background: transparent; color: #fff; border: none; font-size: 14px;
            cursor: pointer; outline: none; font-weight: bold;
        }
        .controls select option { background: #222; }

    </style>
</head>
<body oncontextmenu="return false;">

    <canvas id="snow-canvas"></canvas>

    <header>
        <div class="logo" onclick="showPage('home')">GIXON</div>
        <nav>
            <ul class="nav-links">
                <li><a onclick="showPage('home')" id="nav-home" class="active">الرئيسية</a></li>
                <li><a onclick="showPage('news')" id="nav-news">الأخبار</a></li>
                <li><a style="opacity:0.4; cursor:not-allowed;">المتجر <span class="beta-tag">Beta</span></a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="page-section active">
        <div style="height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
            <h1 style="font-family: 'Changa'; font-size: clamp(60px, 18vw, 120px); color: var(--accent); line-height: 1;">GIXON</h1>
            <p style="font-size: 20px; color: var(--text-dim); margin: 20px 0 40px;">الصحافة المستقلة لعشاق الألعاب</p>
            <button class="hero-btn" onclick="showPage('news')">استكشف التغطيات</button>
        </div>
    </section>

    <section id="news" class="page-section">
        <h2 style="font-family:'Changa'; font-size: 32px; margin-bottom: 40px; color: var(--accent); border-right: 5px solid var(--accent); padding-right: 15px;">آخر الأخبار</h2>
        <div id="news-grid" class="grid"></div>
    </section>

    <div id="article-viewer" class="article-viewer">
        <button class="close-btn" onclick="closeArticle()">إغلاق X</button>
        <div class="article-container">            
            <h1 id="a-title" style="font-family:'Changa'; font-size: 35px; margin: 25px 0; color: var(--accent);"></h1>
            <div id="a-body" class="article-body" style="user-select: text;"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let flakes = [];
        function initSnow() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            flakes = [];
            for (let i = 0; i < 120; i++) { flakes.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2+1, d: Math.random()*1 }); }
        }
        function drawSnow() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.beginPath();
            flakes.forEach(f => { ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2); f.y += f.d + 0.5; if(f.y > canvas.height) f.y = -5; });
            ctx.fill(); requestAnimationFrame(drawSnow);
        }

        const API_KEY = 'AIzaSyBEgRGqe5EorWOKMFZIqa55UShVpcUbLmM';
        const NEWS_URL = 'https://gixondz.blogspot.com/';

        async function fetchNews() {
            const grid = document.getElementById('news-grid');
            try {
                const bRes = await fetch(`https://www.googleapis.com/blogger/v3/blogs/byurl?url=${NEWS_URL}&key=${API_KEY}`);
                const bData = await bRes.json();
                const pRes = await fetch(`https://www.googleapis.com/blogger/v3/blogs/${bData.id}/posts?key=${API_KEY}&maxResults=15`);
                const posts = await pRes.json();

                grid.innerHTML = '';
                posts.items.forEach(post => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => openArticle(post);
                    card.innerHTML = `<img src="${getPostImg(post.content)}" class="card-img"><div class="card-body"><h3 class="card-title">${post.title}</h3></div>`;
                    grid.appendChild(card);
                });
            } catch (e) { grid.innerHTML = '<p style="color:red; text-align:center;">تعذر جلب الأخبار. تأكد من الاتصال.</p>'; }
        }

        function getPostImg(c) {
            const m = c.match(/<img[^>]+src="([^">]+)"/);
            return m ? m[1] : 'https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=600';
        }

        // --- نظام فتح المقال (الزراعة والاستبدال) ---
        function openArticle(post) {
            document.getElementById('a-title').innerText = post.title;
            let cleanContent = post.content;

            // البحث عن رابط MP4
            const mp4Regex = /https?:\/\/[^\s"'<>]+\.mp4/i;
            const videoMatch = cleanContent.match(mp4Regex);
            const videoUrl = videoMatch ? videoMatch[0] : null;

            if (videoUrl) {
                const PLACEHOLDER = 'GIXON_VIDEO_INLINE_PLACEHOLDER';
                let isReplaced = false;

                cleanContent = cleanContent.replace(/<video[^>]*>[\s\S]*?<\/video>/gi, () => { isReplaced = true; return PLACEHOLDER; });
                
                if (!isReplaced) {
                    const aTagRegex = new RegExp(`<a[^>]*href=["']?${videoUrl}["']?[^>]*>[\\s\\S]*?<\/a>`, 'gi');
                    cleanContent = cleanContent.replace(aTagRegex, () => { isReplaced = true; return PLACEHOLDER; });
                }

                if (!isReplaced) {
                    cleanContent = cleanContent.replace(videoUrl, PLACEHOLDER);
                }

                // الكود الدقيق للمشغل الخاص بك
                const playerHTML = `
                <div class="video-container" id="videoContainer">
                    <video id="video" src="${videoUrl}" playsinline></video>
                    <div class="controls">
                        <div class="progress-bar">
                            <input type="range" id="progress" min="0" max="100" value="0">
                        </div>
                        <div class="buttons">
                            <div class="left-controls">
                                <button id="playPauseBtn" title="تشغيل / إيقاف"><i class="fas fa-play"></i></button>
                                <button id="muteBtn" title="الصوت"><i class="fas fa-volume-up"></i></button>
                                <input type="range" id="volume" min="0" max="1" step="0.1" value="1" style="width: 70px;">
                                <div class="time">
                                    <span id="currentTime">00:00</span> / <span id="duration">00:00</span>
                                </div>
                            </div>
                            <div class="right-controls">
                                <select id="speedBtn" title="سرعة التشغيل">
                                    <option value="0.5">0.5x</option>
                                    <option value="1" selected>1x</option>
                                    <option value="1.5">1.5x</option>
                                    <option value="2">2x</option>
                                </select>
                                <button id="fullscreenBtn" title="ملء الشاشة"><i class="fas fa-expand"></i></button>
                            </div>
                        </div>
                    </div>
                </div>`;

                cleanContent = cleanContent.replace(PLACEHOLDER, playerHTML);
            }

            cleanContent = cleanContent.replace(/<img/g, '<img oncontextmenu="return false;" ondragstart="return false;"');
            
            document.getElementById('a-body').innerHTML = cleanContent;
            document.getElementById('article-viewer').classList.add('active');
            document.body.style.overflow = 'hidden';

            // تفعيل المشغل الخاص بك برمجياً إذا تم العثور على فيديو
            if(videoUrl) {
                initCustomPlayer();
            }
        }

        // --- كود الجافاسكريبت الخاص بمشغلك بالضبط ---
        function initCustomPlayer() {
            const video = document.getElementById('video');
            const videoContainer = document.getElementById('videoContainer');
            const playPauseBtn = document.getElementById('playPauseBtn');
            const progress = document.getElementById('progress');
            const muteBtn = document.getElementById('muteBtn');
            const volume = document.getElementById('volume');
            const currentTimeElement = document.getElementById('currentTime');
            const durationElement = document.getElementById('duration');
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            const speedBtn = document.getElementById('speedBtn');

            if(!video) return;

            function togglePlay() {
                if (video.paused) {
                    video.play();
                    playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
                } else {
                    video.pause();
                    playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
                }
            }
            playPauseBtn.addEventListener('click', togglePlay);
            video.addEventListener('click', togglePlay);

            function formatTime(time) {
                const minutes = Math.floor(time / 60);
                const seconds = Math.floor(time % 60);
                return `${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
            }

            video.addEventListener('timeupdate', () => {
                const percentage = (video.currentTime / video.duration) * 100;
                progress.value = percentage || 0;
                currentTimeElement.textContent = formatTime(video.currentTime);
            });

            video.addEventListener('loadedmetadata', () => {
                durationElement.textContent = formatTime(video.duration);
            });

            progress.addEventListener('input', () => {
                const time = (progress.value / 100) * video.duration;
                video.currentTime = time;
            });

            muteBtn.addEventListener('click', () => {
                video.muted = !video.muted;
                if (video.muted || video.volume === 0) {
                    muteBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
                    volume.value = 0;
                } else {
                    muteBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
                    volume.value = video.volume;
                }
            });

            volume.addEventListener('input', () => {
                video.volume = volume.value;
                video.muted = volume.value === '0';
                muteBtn.innerHTML = video.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
            });

            fullscreenBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    videoContainer.requestFullscreen();
                    fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
                } else {
                    document.exitFullscreen();
                    fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
                }
            });

            speedBtn.addEventListener('change', () => {
                video.playbackRate = speedBtn.value;
            });
        }

        function closeArticle() {
            document.getElementById('article-viewer').classList.remove('active');
            const video = document.getElementById('video');
            if (video) video.pause(); // إيقاف الفيديو عند الخروج
            document.getElementById('a-body').innerHTML = ''; 
            document.body.style.overflow = 'auto';
        }

        function showPage(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(document.getElementById('nav-'+id)) document.getElementById('nav-'+id).classList.add('active');
            window.scrollTo(0,0);
        }

        window.onload = () => { initSnow(); drawSnow(); fetchNews(); };
        window.onresize = initSnow;

    </script>
</body>
</html>
